<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse - Retro Search Engine</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-text">GLIMPSE</span>
                <div class="logo-subtitle">RETRO SEARCH</div>
            </div>
        </header>

        <main class="main-content">
            <div class="search-container">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Enter your search query..."
                        class="search-input"
                    >
                    <button id="searchBtn" class="search-btn">
                        <span class="btn-text">SEARCH</span>
                    </button>
                </div>
                
                <div class="search-options">
                    <label class="radio-container">
                        <input type="radio" name="searchType" value="web" checked>
                        <span class="radio-custom"></span>
                        <span class="radio-label">Web Content</span>
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="searchType" value="arns">
                        <span class="radio-custom"></span>
                        <span class="radio-label">ARNS Domains</span>
                    </label>
                </div>
            </div>

            <div class="results-container" id="resultsContainer">
                <div class="loading" id="loading" style="display: none;">
                    <div class="loading-grid">
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                        <div class="loading-cell"></div>
                    </div>
                    <div class="loading-text">SEARCHING...</div>
                </div>
                
                <div class="results-grid" id="resultsGrid"></div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-text">Powered by Arweave & CLIP</div>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
